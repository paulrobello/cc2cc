services:
  redis:
    image: redis:alpine
    restart: unless-stopped
    command: redis-server --requirepass ${CC2CC_REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${CC2CC_REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  hub:
    build:
      context: .
      dockerfile: hub/Dockerfile
    restart: unless-stopped
    ports:
      - "${CC2CC_HUB_PORT:-3100}:3100"
    environment:
      CC2CC_REDIS_URL: redis://:${CC2CC_REDIS_PASSWORD:-changeme}@redis:6379
      CC2CC_HUB_API_KEY: ${CC2CC_HUB_API_KEY}
      CC2CC_HUB_PORT: 3100
    depends_on:
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CC2CC_HUB_WS_URL: ws://${CC2CC_HOST_LAN_IP:-localhost}:3100
        NEXT_PUBLIC_CC2CC_HUB_API_KEY: ${CC2CC_HUB_API_KEY}
    restart: unless-stopped
    ports:
      - "8029:8029"
    depends_on:
      hub:
        condition: service_started

volumes:
  redis_data:
